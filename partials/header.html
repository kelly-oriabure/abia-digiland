<script>
  (function () {
    var current = (window.location.pathname.split('/').pop() || 'index.html');
    document.querySelectorAll('.nav-link[data-page], .mobile-nav-link[data-page]').forEach(function (link) {
      if (link.getAttribute('data-page') === current) {
        link.classList.add('text-[#004A7C]', 'dark:text-blue-400');
        if (link.classList.contains('nav-link')) {
          link.classList.add('border-b-2', 'border-[#004A7C]', 'pb-1');
        }
        if (link.classList.contains('mobile-nav-link')) {
          link.classList.add('bg-slate-50', 'dark:bg-slate-800/50');
        }
        link.classList.remove('text-slate-500', 'dark:text-slate-400', 'text-slate-600', 'dark:text-slate-300');
      }
    });

    var menu = document.getElementById('mobile-menu');
    var panel = document.getElementById('mobile-menu-panel');
    var backdrop = document.getElementById('mobile-menu-backdrop');
    var openBtn = document.getElementById('mobile-menu-btn');
    var closeBtn = document.getElementById('mobile-menu-close');

    function openMenu() {
      menu.classList.remove('hidden');
      menu.setAttribute('aria-hidden', 'false');
      openBtn.setAttribute('aria-expanded', 'true');
      document.body.classList.add('overflow-hidden');
      requestAnimationFrame(function () {
        backdrop.classList.remove('opacity-0');
        panel.classList.remove('-translate-x-full');
      });
    }

    function closeMenu() {
      backdrop.classList.add('opacity-0');
      panel.classList.add('-translate-x-full');
      setTimeout(function () {
        menu.classList.add('hidden');
        menu.setAttribute('aria-hidden', 'true');
        openBtn.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('overflow-hidden');
      }, 300);
    }

    if (openBtn) openBtn.addEventListener('click', openMenu);
    if (closeBtn) closeBtn.addEventListener('click', closeMenu);
    if (backdrop) backdrop.addEventListener('click', closeMenu);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !menu.classList.contains('hidden')) {
        closeMenu();
      }
    });
  })();
</script>
